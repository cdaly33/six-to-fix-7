name: Deploy Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: prod
        type: choice
        options:
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_timestamp: ${{ steps.meta.outputs.build_timestamp }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore SixToFix.slnx

      - name: Capture build metadata
        id: meta
        run: echo "build_timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and publish
        run: |
          dotnet publish src/SixToFix.Web/SixToFix.Web.csproj \
            -c Release \
            -o ./publish \
            --no-self-contained

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: ./publish

  # deploy-dev:
  #   needs: build
  #   runs-on: ubuntu-latest
  #   environment: dev
  #   if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'dev'
  #   steps:
