name: Deploy Infrastructure

# Infrastructure is deployed manually via Bicep CLI — NOT via GitHub Actions.
# This workflow is disabled. See docs/deployment/AZURE-DEPLOYMENT-GUIDE.md.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (manual only — infra is deployed via Bicep CLI)
        required: true
        default: prod
        type: choice
        options:
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate linuxFxVersion in appservice.bicep
        run: |
          VALUE=$(grep -oP "linuxFxVersion:\s*'\K[^']+" infra/modules/appservice.bicep)
          echo "linuxFxVersion = '$VALUE'"
          if [[ "$VALUE" != DOTNETCORE* ]]; then
            echo "::error file=infra/modules/appservice.bicep::linuxFxVersion must start with 'DOTNETCORE|' — got '$VALUE'. Using 'DOTNET|' silently falls back to a PHP container (403). Fix the value before deploying."
            exit 1
          fi
          echo "✅ linuxFxVersion is valid: '$VALUE'"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group rg-sixtofix-prod \
            --template-file infra/main.bicep \
            --parameters infra/params/${{ github.event.inputs.environment || 'dev' }}.bicepparam \
            --name deploy-$(date +%Y%m%d%H%M%S)

      - name: Output deployment summary
        run: |
          echo '## 🚀 Infrastructure Deployment' >> "$GITHUB_STEP_SUMMARY"
          echo "**Environment:** ${{ github.event.inputs.environment || 'dev' }}" >> "$GITHUB_STEP_SUMMARY"
          echo '**Status:** ✅ Success' >> "$GITHUB_STEP_SUMMARY"
