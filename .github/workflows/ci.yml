name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  restore:
    name: Restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore SixToFix.slnx

  build:
    name: Build
    needs: restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore SixToFix.slnx

      - name: Build (warnings as errors)
        run: dotnet build SixToFix.slnx --no-restore --configuration Release --warnaserror

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: '**/bin/Release/**'
          retention-days: 1

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore SixToFix.slnx

      - name: Test Domain (with coverage)
        run: |
          dotnet test tests/SixToFix.Domain.Tests \
            --no-restore \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults/Domain \
            --logger "trx;LogFileName=domain.trx"

      - name: Test Application (with coverage)
        run: |
          dotnet test tests/SixToFix.Application.Tests \
            --no-restore \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults/Application \
            --logger "trx;LogFileName=application.trx"

      - name: Test Web Components (bUnit)
        run: |
          dotnet test tests/SixToFix.Web.Tests \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=web.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/**/*.trx

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: TestResults/**/coverage.cobertura.xml

  coverage-gate:
    name: Coverage Gate (80% Domain + Application)
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: coverage

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report and enforce threshold
        run: |
          reportgenerator \
            -reports:"coverage/**/coverage.cobertura.xml" \
            -targetdir:coverage-report \
            -reporttypes:"TextSummary;MarkdownSummaryGithub" \
            -assemblyfilters:"+SixToFix.Domain;+SixToFix.Application" \
            -minimumcoverageThresholds:lineCoverage=80

      - name: Post coverage summary
        if: always()
        run: |
          if [ -f coverage-report/SummaryGithub.md ]; then
            cat coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f coverage-report/Summary.txt ]; then
            cat coverage-report/Summary.txt
          fi

  lint:
    name: Format Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore SixToFix.slnx

      - name: Check formatting
        run: dotnet format SixToFix.slnx --verify-no-changes --verbosity diagnostic

  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore SixToFix.slnx

      - name: Check for vulnerable packages
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt

      - name: Fail on HIGH or CRITICAL vulnerabilities
        run: |
          if grep -q "High\|Critical" vuln-report.txt; then
            echo "::error::High or Critical vulnerabilities found. See vuln-report.txt artifact."
            exit 1
          fi
          echo "✅ No High or Critical vulnerabilities found."

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulnerability-report
          path: vuln-report.txt
