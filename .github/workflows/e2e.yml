name: E2E — Playwright

on:
  workflow_run:
    workflows: ["Integration Tests"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  guard:
    name: Guard — Check Integration Tests Passed
    runs-on: ubuntu-latest
    steps:
      - name: Check upstream workflow conclusion
        if: ${{ github.event.workflow_run.conclusion != 'success' }}
        run: |
          echo "::error::Upstream 'Integration Tests' workflow did not succeed (conclusion: ${{ github.event.workflow_run.conclusion }}). Aborting E2E."
          exit 1

  deploy-dev:
    name: Deploy to Dev
    needs: guard
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore & Publish
        run: |
          dotnet restore SixToFix.slnx
          dotnet publish src/SixToFix.Web/SixToFix.Web.csproj \
            --configuration Release \
            --output ./publish

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service (dev)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_SERVICE_NAME_DEV }}
          package: ./publish

  smoke-test:
    name: Smoke Test — Health Check
    needs: deploy-dev
    runs-on: ubuntu-latest
    steps:
      - name: Wait for app to start and health check
        run: |
          HEALTH_URL="https://${{ vars.AZURE_APP_SERVICE_NAME_DEV }}.azurewebsites.net/health"
          for i in 1 2 3; do
            echo "Attempt $i: GET $HEALTH_URL"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" --max-time 30)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "⏳ HTTP $STATUS — waiting 10s before retry..."
            sleep 10
          done
          echo "::error::Health check failed after 3 attempts."
          exit 1

  playwright-e2e:
    name: Playwright E2E
    needs: smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore SixToFix.slnx

      - name: Build E2E project
        run: dotnet build tests/SixToFix.E2E.Tests --configuration Release

      - name: Install Playwright browsers
        run: pwsh tests/SixToFix.E2E.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: https://${{ vars.AZURE_APP_SERVICE_NAME_DEV }}.azurewebsites.net
        run: |
          dotnet test tests/SixToFix.E2E.Tests \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=e2e.trx"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/SixToFix.E2E.Tests/playwright-report/
          retention-days: 30

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: '**/e2e.trx'

  notify:
    name: Notify
    needs: playwright-e2e
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Post E2E summary
        run: |
          if [ "${{ needs.playwright-e2e.result }}" = "success" ]; then
            echo "## ✅ E2E Tests Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ E2E Tests Failed" >> $GITHUB_STEP_SUMMARY
            echo "Check the Playwright report artifact for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create failure issue
        if: ${{ needs.playwright-e2e.result != 'success' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `E2E Test Failure — ${new Date().toISOString().split('T')[0]}`,
              body: `## E2E Test Failure\n\n**Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n**Branch:** \`${context.ref}\`\n\nCheck the Playwright report artifact for trace files and failure details.`,
              labels: ['e2e-failure', 'bug']
            });
