name: "systems-maturity-scoring"
version: "1.0"
description: >
  Assess operational and systems maturity across four dimensions: documentation, repeatability,
  measurability, and owner-independence. Produces a 0–20 Systems Maturity Score derived from
  maturity questionnaire responses and the Skill 1 scorecard context.
model: "gpt-4o"
output_schema_pointer: "#/output_schema"
depends_on:
  - "6tofix-scorecard-rubric"

system_prompt: |
  You are a marketing operations expert assessing the operational maturity of a client's marketing function.
  You are analyzing four maturity dimensions — documentation, repeatability, measurability, and
  owner-independence — using direct questionnaire responses from the client.

  DIMENSION DEFINITIONS:
    - documentation (0–5): Are marketing processes, strategies, and campaigns documented in writing?
        0: Nothing documented. 1: Some ad hoc notes. 2: Key processes partially documented.
        3: Most processes documented but incomplete. 4: Comprehensive documentation, not always current.
        5: Complete, current, and maintained documentation across all marketing functions.
    - repeatability (0–5): Can marketing activities be reliably executed by different people without key-person dependency?
        0: All execution is ad hoc. 1: Some processes are repeated but not documented.
        2: Key campaigns have loose templates. 3: Most campaigns follow documented playbooks.
        4: Strong playbook library with version control. 5: Fully systematized, any competent hire can execute.
    - measurability (0–5): Are marketing outcomes tracked with meaningful metrics tied to business results?
        0: No measurement. 1: Only vanity metrics (likes, impressions). 2: Some conversion tracking.
        3: Multi-stage funnel measurement. 4: Attribution model in place, reported regularly.
        5: Full closed-loop reporting from marketing spend to revenue, continuously optimized.
    - owner_independence (0–5): Does marketing execution depend on a single person (founder/owner)?
        0: Everything requires owner. 1: Owner approves all decisions but delegates execution.
        2: Some campaigns run without owner. 3: Most marketing runs independently with owner review.
        4: Owner is strategic only; execution is fully delegated. 5: Marketing is fully autonomous with governance.

  SCORING RULES:
    1. Score each dimension 0–5 based ONLY on the questionnaire responses provided.
    2. systems_maturity_score MUST equal the sum of all four dimension scores (max 20).
    3. dimension_rationale: explain in 1–3 sentences why you assigned each score, citing specific answers.
    4. confidence: your overall confidence (0.0–1.0) in the accuracy of this maturity assessment.
       Lower confidence if questionnaire answers are ambiguous or contradictory.
    5. Return ONLY the JSON output matching the output schema. No prose, no markdown.

  CONTEXT: The client's scorecard output from Skill 1 is provided for context but should NOT dominate
  your maturity scoring. Dimension scores are based on the questionnaire, not the scorecard.

output_schema:
  $schema: "http://json-schema.org/draft-07/schema#"
  title: "SystemsMaturityOutput"
  type: object
  required:
    - systems_maturity_score
    - maturity_dimensions
    - confidence
  properties:
    systems_maturity_score:
      type: integer
      minimum: 0
      maximum: 20
      description: "Sum of all 4 dimension scores. Must equal documentation + repeatability + measurability + owner_independence."
    maturity_dimensions:
      type: object
      required: [documentation, repeatability, measurability, owner_independence]
      additionalProperties: false
      properties:
        documentation:      {type: integer, minimum: 0, maximum: 5}
        repeatability:      {type: integer, minimum: 0, maximum: 5}
        measurability:      {type: integer, minimum: 0, maximum: 5}
        owner_independence: {type: integer, minimum: 0, maximum: 5}
    dimension_rationale:
      type: object
      required: [documentation, repeatability, measurability, owner_independence]
      additionalProperties: false
      properties:
        documentation:      {type: string, minLength: 1, maxLength: 500}
        repeatability:      {type: string, minLength: 1, maxLength: 500}
        measurability:      {type: string, minLength: 1, maxLength: 500}
        owner_independence: {type: string, minLength: 1, maxLength: 500}
    confidence:
      type: number
      minimum: 0.0
      maximum: 1.0
  additionalProperties: false

input_schema:
  $schema: "http://json-schema.org/draft-07/schema#"
  title: "SystemsMaturityInput"
  type: object
  required: [scorecard_output, maturity_questionnaire]
  properties:
    scorecard_output:
      type: object
      description: "Full output from Skill 1 (6tofix-scorecard-rubric). Passed through in its entirety."
      required: [area_scores, composite_score]
      properties:
        area_scores:          {type: object}
        composite_score:      {type: integer, minimum: 0, maximum: 60}
        confidence_scores:    {type: object}
        evidence_used:        {type: object}
        documented_strategy:  {type: object}
    maturity_questionnaire:
      type: object
      required: [documentation, repeatability, measurability, owner_independence]
      additionalProperties: false
      properties:
        documentation:
          type: object
          required: [responses]
          properties:
            responses:
              type: array
              items:
                type: object
                required: [question_id, answer]
                properties:
                  question_id: {type: string}
                  answer:      {type: string}
              minItems: 1
        repeatability:
          type: object
          required: [responses]
          properties:
            responses:
              type: array
              items:
                type: object
                required: [question_id, answer]
                properties:
                  question_id: {type: string}
                  answer:      {type: string}
              minItems: 1
        measurability:
          type: object
          required: [responses]
          properties:
            responses:
              type: array
              items:
                type: object
                required: [question_id, answer]
                properties:
                  question_id: {type: string}
                  answer:      {type: string}
              minItems: 1
        owner_independence:
          type: object
          required: [responses]
          properties:
            responses:
              type: array
              items:
                type: object
                required: [question_id, answer]
                properties:
                  question_id: {type: string}
                  answer:      {type: string}
              minItems: 1
  additionalProperties: false

max_tokens: 2000
temperature: 0.2

notes: |
  SkillRunner reads systems_maturity_score into skill_runs.activity_score for this skill.
  SkillRunner reads confidence into skill_runs.confidence_score for this skill.
  Both are optional reads — null if fields are absent (schema validation enforces presence before this point).
  
  Skill 2 is SkillIndex = 1. Its full output is forwarded as systems_maturity_output to Skills 3 and 5.
