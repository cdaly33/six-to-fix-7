<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tier 1 Audit Dashboard — Acme HVAC</title>
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f7f6f0;
  --bg-tertiary: #f1efe8;
  --bg-info: #e6f1fb;
  --bg-success: #eaf3de;
  --bg-warning: #faeeda;
  --bg-danger: #fcebeb;
  --text-primary: #1a1a18;
  --text-secondary: #5f5e5a;
  --text-tertiary: #888780;
  --text-info: #185fa5;
  --text-success: #3b6d11;
  --text-warning: #854f0b;
  --text-danger: #a32d2d;
  --border: rgba(0, 0, 0, 0.10);
  --border-strong: rgba(0, 0, 0, 0.18);
  --radius-md: 8px;
  --radius-lg: 12px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text-primary);
  background: var(--bg-tertiary);
}
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 32px 24px;
}
.brand {
  font-size: 12px;
  color: var(--text-secondary);
  margin: 0 0 4px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.client-name { font-size: 22px; font-weight: 500; margin: 0; }
.audit-meta { font-size: 13px; color: var(--text-secondary); margin: 4px 0 0; }
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding-bottom: 20px;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 24px;
}
.tier-pill {
  background: var(--bg-info);
  color: var(--text-info);
  font-size: 13px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 999px;
  white-space: nowrap;
}
.metric-row {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.metric-card {
  background: var(--bg-secondary);
  border-radius: var(--radius-md);
  padding: 16px;
}
.metric-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin: 0 0 4px;
}
.metric-value {
  font-size: 26px;
  font-weight: 500;
  margin: 0;
  line-height: 1.1;
}
.metric-suffix {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 400;
  margin-left: 4px;
}
.section-label {
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
  margin: 28px 0 12px;
}
.area-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}
.area-card {
  background: var(--bg-primary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.05s;
}
.area-card:hover {
  border-color: var(--border-strong);
}
.area-card.active {
  border: 1.5px solid var(--text-info);
  padding: 14.5px 16.5px;
}
.area-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.area-name { font-size: 14px; font-weight: 500; margin: 0; }
.pill {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 999px;
}
.pill-current { background: var(--bg-success); color: var(--text-success); }
.pill-partial { background: var(--bg-warning); color: var(--text-warning); }
.pill-none { background: var(--bg-danger); color: var(--text-danger); }
.activity-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin: 0;
}
.activity-score {
  font-size: 26px;
  font-weight: 500;
  margin: 0;
  line-height: 1.1;
}
.activity-score-suffix {
  font-size: 13px;
  color: var(--text-secondary);
}
.score-bar {
  height: 4px;
  background: var(--bg-secondary);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 8px;
}
.score-bar-fill {
  height: 100%;
  background: var(--text-primary);
}
.top-gap {
  font-size: 12px;
  color: var(--text-secondary);
  margin: 12px 0 0;
  line-height: 1.4;
}

.drilldown {
  background: var(--bg-primary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-top: 16px;
}
.drilldown h3 {
  font-size: 16px;
  font-weight: 500;
  margin: 0 0 4px;
}
.drilldown-meta {
  font-size: 13px;
  color: var(--text-secondary);
  margin: 0 0 20px;
}
.drilldown-section-label {
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
  margin: 20px 0 10px;
}
.element-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 0.5px solid var(--border);
  font-size: 13px;
}
.element-row:last-child { border-bottom: none; }
.element-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  margin-top: 2px;
}
.element-icon.current { color: var(--text-success); }
.element-icon.stale { color: var(--text-warning); }
.element-icon.missing { color: var(--text-danger); }
.element-name { font-weight: 500; }
.element-evidence { color: var(--text-secondary); font-size: 12px; margin-top: 2px; }
.gap-narrative {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-primary);
  margin: 0;
}
.support-row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}
.support-card {
  background: var(--bg-primary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
}
.support-title { font-size: 13px; font-weight: 500; margin: 0 0 12px; }
.support-row-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  margin-bottom: 8px;
}
.support-row-item:last-child { margin-bottom: 0; }
.support-row-label { flex: 0 0 130px; color: var(--text-primary); }
.support-row-bar {
  height: 4px;
  flex: 1;
  background: var(--bg-secondary);
  border-radius: 2px;
  overflow: hidden;
}
.support-row-bar-fill { height: 100%; background: var(--text-primary); }
.support-row-bar-fill.benchmark {
  background: var(--text-secondary);
  opacity: 0.4;
}
.support-row-num {
  color: var(--text-secondary);
  min-width: 28px;
  text-align: right;
}
.kv-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}
.kv-row:last-child { margin-bottom: 0; }
.kv-label { font-size: 12px; color: var(--text-secondary); }
.kv-value { font-size: 18px; font-weight: 500; }
.kv-value-suffix { font-size: 11px; color: var(--text-secondary); margin-left: 2px; }
.kv-row.highlight {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 0.5px solid var(--border);
}
.kv-row.highlight .kv-value { color: var(--text-success); }

.roadmap-table {
  background: var(--bg-primary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
}
.roadmap-row {
  display: grid;
  grid-template-columns: 32px 1fr 110px 90px 80px;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 0.5px solid var(--border);
  font-size: 13px;
  align-items: center;
}
.roadmap-row:last-child { border-bottom: none; }
.roadmap-row.header {
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 500;
  border-bottom: 0.5px solid var(--border-strong);
  padding-bottom: 8px;
}
.priority-num {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}
.tag {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--bg-secondary);
  color: var(--text-secondary);
}
.tag.system { background: var(--bg-info); color: var(--text-info); }
.tag.activity { background: var(--bg-warning); color: var(--text-warning); }
.tag.high { background: var(--bg-success); color: var(--text-success); }
.tag.medium { background: var(--bg-warning); color: var(--text-warning); }
.tag.low { background: var(--bg-secondary); color: var(--text-secondary); }
.docs-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}
.docs-link {
  background: var(--bg-secondary);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 6px 12px;
  font-size: 12px;
  color: var(--text-primary);
  text-decoration: none;
}
.docs-link:hover { background: var(--bg-tertiary); }
.dev-banner {
  background: #fef9e7;
  border: 0.5px solid #f0d574;
  border-radius: var(--radius-md);
  padding: 10px 14px;
  font-size: 12px;
  color: #5a4a0a;
  margin-bottom: 24px;
}
.dev-banner code {
  background: rgba(0,0,0,0.06);
  padding: 1px 4px;
  border-radius: 3px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 11px;
}
@media (max-width: 800px) {
  .metric-row, .area-grid, .support-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .roadmap-row { grid-template-columns: 28px 1fr 80px; }
  .roadmap-row > :nth-child(4), .roadmap-row > :nth-child(5) { display: none; }
}
@media (max-width: 540px) {
  .metric-row, .area-grid, .support-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">

<div class="dev-banner">
  Wireframe build · this dashboard is bound to the embedded <code>auditData</code> JSON literal at the bottom of the file. In production, this becomes a fetch from the backend.
</div>

<div id="header" class="header"></div>
<div id="metrics" class="metric-row"></div>

<div class="section-label">6 To Fix scorecard</div>
<div id="scorecard" class="area-grid"></div>

<div id="drilldown-container"></div>

<div class="section-label">Supporting deliverables</div>
<div id="support" class="support-row"></div>

<div class="section-label">90-day roadmap</div>
<div id="roadmap" class="roadmap-table"></div>

<div class="section-label">Audit documents</div>
<div id="docs" class="docs-row"></div>

</div>

<script>

const TIER_LABELS = {
  self_execute: "Recommended path: Self-execute",
  tier_2: "Recommended path: Tier 2",
  tier_3: "Recommended path: Tier 3"
};

const STATUS_ICONS = {
  current: "✓",
  stale: "~",
  missing: "✗"
};

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
}

function fmtMoney(n) {
  return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(n);
}

function renderHeader(eng) {
  return `
    <div>
      <p class="brand">Strategic Glue · Tier 1 Audit</p>
      <p class="client-name">${eng.client_name}</p>
      <p class="audit-meta">Audit baseline · ${fmtDate(eng.audit_date)} · Re-score ${fmtDate(eng.next_rescore_date)}</p>
    </div>
    <span class="tier-pill">${TIER_LABELS[eng.tier_recommendation]}</span>
  `;
}

function renderMetrics(data) {
  const sc = data.scorecard;
  const sm = data.systems_maturity;
  const ai = data.ai_readiness;
  return `
    <div class="metric-card">
      <p class="metric-label">Marketing maturity</p>
      <p class="metric-value">${sc.total_marketing_maturity}<span class="metric-suffix">/60</span></p>
    </div>
    <div class="metric-card">
      <p class="metric-label">Documented strategy</p>
      <p class="metric-value">${sc.documented_strategy_coverage}<span class="metric-suffix">/6 areas</span></p>
    </div>
    <div class="metric-card">
      <p class="metric-label">Systems maturity</p>
      <p class="metric-value">${sm.total}<span class="metric-suffix">/20</span></p>
    </div>
    <div class="metric-card">
      <p class="metric-label">AI-readiness</p>
      <p class="metric-value">${ai.automation_opportunity_pct}<span class="metric-suffix">%</span></p>
    </div>
  `;
}

function renderAreaCard(key, area, isActive) {
  const pillClass = `pill pill-${area.documented_strategy}`;
  const pillText = area.documented_strategy.charAt(0).toUpperCase() + area.documented_strategy.slice(1);
  const fillPct = (area.activity_score / 10) * 100;
  return `
    <div class="area-card ${isActive ? 'active' : ''}" data-area="${key}">
      <div class="area-header">
        <p class="area-name">${key.charAt(0).toUpperCase() + key.slice(1)}</p>
        <span class="${pillClass}">${pillText}</span>
      </div>
      <p class="activity-label">Activity</p>
      <p class="activity-score">${area.activity_score}<span class="activity-score-suffix">/10</span></p>
      <div class="score-bar"><div class="score-bar-fill" style="width: ${fillPct}%"></div></div>
      <p class="top-gap">${area.top_gap}</p>
    </div>
  `;
}

function renderScorecard(scorecard, activeArea) {
  return Object.entries(scorecard.areas).map(([key, area]) => renderAreaCard(key, area, key === activeArea)).join("");
}

function renderDrilldown(key, area) {
  const elements = area.documented_strategy_elements.map(el => `
    <div class="element-row">
      <span class="element-icon ${el.status}">${STATUS_ICONS[el.status]}</span>
      <div style="flex: 1;">
        <span class="element-name">${el.name}</span>
        <span style="color: var(--text-tertiary); margin-left: 8px;">${el.status}</span>
        <p class="element-evidence">${el.evidence}</p>
      </div>
    </div>
  `).join("");
  return `
    <div class="drilldown">
      <h3>${key.charAt(0).toUpperCase() + key.slice(1)} · drill-down</h3>
      <p class="drilldown-meta">Activity ${area.activity_score}/10 · Documented strategy: ${area.documented_strategy}</p>
      <p class="drilldown-section-label">Documented strategy elements</p>
      ${elements}
      <p class="drilldown-section-label">Gap narrative</p>
      <p class="gap-narrative">${area.gap_narrative}</p>
    </div>
  `;
}

function renderSupport(data) {
  const driverRows = data.value_drivers.drivers.map(d => `
    <div class="support-row-item">
      <span class="support-row-label">${d.name}</span>
      <div class="support-row-bar"><div class="support-row-bar-fill" style="width: ${(d.score / d.max) * 100}%"></div></div>
      <span class="support-row-num">${d.score}/${d.max}</span>
    </div>
  `).join("");

  const sm = data.systems_maturity;
  const dimensions = [
    ["Documented", sm.dimensions.documented.score],
    ["Repeatable", sm.dimensions.repeatable.score],
    ["Measurable", sm.dimensions.measurable.score],
    ["Owner-independent", sm.dimensions.owner_independent.score]
  ];
  const dimRows = dimensions.map(([label, score]) => `
    <div class="support-row-item">
      <span class="support-row-label">${label}</span>
      <div class="support-row-bar"><div class="support-row-bar-fill" style="width: ${(score / 5) * 100}%"></div></div>
      <span class="support-row-num">${score}/5</span>
    </div>
  `).join("");

  const ai = data.ai_readiness;
  return `
    <div class="support-card">
      <p class="support-title">Value drivers</p>
      ${driverRows}
    </div>
    <div class="support-card">
      <p class="support-title">Systems maturity</p>
      ${dimRows}
      <div class="kv-row" style="margin-top: 14px; padding-top: 10px; border-top: 0.5px solid var(--border);">
        <span class="kv-label">Total</span>
        <span style="font-size: 14px; font-weight: 500;">${sm.total}/20</span>
      </div>
    </div>
    <div class="support-card">
      <p class="support-title">AI-readiness</p>
      <div class="kv-row"><span class="kv-label">AI-executable</span><span class="kv-value">${ai.automation_opportunity_pct}%</span></div>
      <div class="kv-row"><span class="kv-label">Avoided labor cost</span><span class="kv-value">${fmtMoney(ai.labor_savings_annual)}<span class="kv-value-suffix">/yr</span></span></div>
      <div class="kv-row"><span class="kv-label">Tier 3 cost</span><span class="kv-value">${fmtMoney(ai.tier3_annual_cost)}<span class="kv-value-suffix">/yr</span></span></div>
      <div class="kv-row highlight"><span class="kv-label">Net annual benefit</span><span class="kv-value">${fmtMoney(ai.net_annual_benefit)}</span></div>
    </div>
  `;
}

function renderRoadmap(roadmap) {
  const header = `
    <div class="roadmap-row header">
      <span>#</span>
      <span>Item</span>
      <span>Area</span>
      <span>Impact</span>
      <span>Type</span>
    </div>
  `;
  const rows = roadmap.items.map(item => `
    <div class="roadmap-row">
      <span class="priority-num">${item.priority}</span>
      <span>${item.title}</span>
      <span class="tag">${item.area}</span>
      <span class="tag ${item.value_impact}">${item.value_impact}</span>
      <span class="tag ${item.activity_or_system}">${item.activity_or_system}</span>
    </div>
  `).join("");
  return header + rows;
}

function renderDocs(documents) {
  const labels = {
    scorecard_pdf: "Scorecard",
    gap_analysis_pdf: "Gap analysis",
    systems_maturity_pdf: "Systems maturity",
    value_driver_pdf: "Value drivers",
    ai_readiness_pdf: "AI-readiness",
    roadmap_pdf: "Roadmap",
    readout_slides: "Readout slides",
    readout_recording: "Readout recording"
  };
  return Object.entries(documents).map(([key, url]) => `
    <a class="docs-link" href="${url}">${labels[key] || key}</a>
  `).join("");
}

let activeArea = null;

function render() {
  document.getElementById("header").innerHTML = renderHeader(AUDIT_DATA.engagement);
  document.getElementById("metrics").innerHTML = renderMetrics(AUDIT_DATA);
  document.getElementById("scorecard").innerHTML = renderScorecard(AUDIT_DATA.scorecard, activeArea);
  document.getElementById("drilldown-container").innerHTML = activeArea
    ? renderDrilldown(activeArea, AUDIT_DATA.scorecard.areas[activeArea])
    : "";
  document.getElementById("support").innerHTML = renderSupport(AUDIT_DATA);
  document.getElementById("roadmap").innerHTML = renderRoadmap(AUDIT_DATA.roadmap);
  document.getElementById("docs").innerHTML = renderDocs(AUDIT_DATA.documents);

  document.querySelectorAll(".area-card").forEach(card => {
    card.addEventListener("click", () => {
      const key = card.dataset.area;
      activeArea = activeArea === key ? null : key;
      render();
      if (activeArea) {
        setTimeout(() => {
          document.querySelector(".drilldown")?.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }, 50);
      }
    });
  });
}

render();
</script>

</body>
</html>
